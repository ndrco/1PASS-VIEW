name: Bug report
description: Report an issue with 1Pass-view
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the current behavior and what you expected.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List steps to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit / version
      description: Git commit hash or release tag.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and any relevant details.
